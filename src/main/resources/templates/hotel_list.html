<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <!--Import Google Icon Font-->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <!--Import materialize.css-->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css"
      rel="stylesheet"
    />
    <!--Import internal css-->
    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <link rel="stylesheet" th:href="@{/css/hotel_list.css}" />

    <!--Let browser know website is optimized for mobile-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />

    <title>宿泊施設一覧</title>
  </head>

  <body>
    <header>
      <nav class="white z-depth-1">
        <div class="nav-wrapper container">
          <a th:href="@{/top}" class="brand-logo">
            <img
              th:src="@{/img/logo.png}"
              alt="宿泊予約サイトロゴ"
              class="logo-img"
            />
          </a>

          <ul class="right hide-on-med-and-down">
            <li>
              <a th:href="@{/showHotelList}" class="black-text">施設一覧</a>
            </li>
            <li><a href="mypage.html" class="black-text">マイページ</a></li>
            <li><a th:href="@{/toLogin}" class="black-text">ログイン</a></li>
            <li><a href="register.html" class="btn">会員登録</a></li>
          </ul>
        </div>
      </nav>
    </header>

    <div class="container">
      <h4 class="center-align">宿泊施設一覧</h4>
      <div class="row">
        <!-- 検索フォーム -->
        <div class="col s12 m4">
          <div class="sidebar teal lighten-5 z-depth-1">
            <h5 class="center-align">検索条件</h5>
            <div class="input-field">
              <input type="text" id="location" placeholder="地名、施設名など" />
              <label for="location">場所</label>
            </div>
            <div class="input-field">
              <input type="number" id="min-price" min="0" />
              <label for="min-price">最小価格</label>
            </div>
            <div class="input-field">
              <input type="number" id="max-price" min="0" />
              <label for="max-price">最大価格</label>
            </div>
            <div class="input-field">
              <input type="date" id="checkin-date" />
              <label for="checkin-date">チェックイン日</label>
            </div>
            <button
              class="btn waves-effect waves-light full-width lighten-3"
              style="width: 100%"
            >
              検　索
            </button>
          </div>
        </div>

        <!-- 宿泊施設リスト -->
        <div class="col s12 m8">
          <div th:each="hotel : ${hotelList}" class="card horizontal top-card">
            <div class="card-image">
              <img
                th:src="@{/img/} + ${hotel.imagePath}"
                th:alt="${hotel.name}"
              />
            </div>
            <div class="card-stacked">
              <div class="card-content">
                <h5 class="blue-text text-darken-3" th:text="${hotel.name}">
                  海辺のホテル青空
                </h5>
                <hr />
                <p th:text="${hotel.description}">
                  海が目の前に広がる絶景のリゾートホテル。波の音に癒されるひとときを。
                </p>
                <p>
                  <strong>¥14,900〜25,700</strong>
                </p>
              </div>
              <div class="card-action">
                <a
                  th:href="@{/showHotelDetail?hotelId=} + ${hotel.id}"
                  class="blue-text text-darken-2"
                  >詳細を見る</a
                >
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- フッター -->
    <footer class="page-footer grey lighten-4 grey-text text-darken-1">
      <div class="container center-align">
        &copy; 2025 宿泊予約サイト All rights reserved.
      </div>
    </footer>
    <!-- Materialize JS CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  </body>
</html>
