<!DOCTYPE html>
<html lang="ja">
  <head>
    <!--Import Google Icon Font-->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <!--Import materialize.css-->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css"
      rel="stylesheet"
    />
    <!--Import internal css-->
    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <link rel="stylesheet" th:href="@{/css/reservation.css}" />

    <!--Let browser know website is optimized for mobile-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />

    <title>宿泊予約フォーム</title>
  </head>
  <body class="grey lighten-4">
    <header>
      <nav class="white z-depth-1">
        <div class="nav-wrapper container">
          <a href="top.html" class="brand-logo">
            <img
              src="../static/img/logo.png"
              alt="宿泊予約サイトロゴ"
              class="logo-img"
            />
          </a>

          <ul class="right hide-on-med-and-down">
            <li><a href="hotel_list.html" class="black-text">施設一覧</a></li>
            <li><a href="mypage.html" class="black-text">マイページ</a></li>
            <li><a href="login.html" class="black-text">ログイン</a></li>
            <li>
              <a href="register.html" class="btn blue lighten-1 white-text"
                >会員登録</a
              >
            </li>
          </ul>
        </div>
      </nav>
    </header>

    <div class="container reservation-form">
      <div class="row">
        <div class="col s12 m8 offset-m2">
          <div class="card">
            <div class="card-content">
              <span class="card-title center-align">宿泊予約フォーム</span>

              <div class="reservation-hotel-info">
                <div class="card horizontal">
                  <div class="card-image">
                    <img
                      th:src="@{/img/} + ${hotel.imagePath}"
                      th:alt="${hotel.name}"
                      style="height: 130px"
                    />
                  </div>
                  <div class="card-stacked">
                    <div class="card-content">
                      <h6
                        class="blue-text text-darken-2"
                        th:text="${hotel.name}"
                      >
                        海辺のホテル青空
                      </h6>
                      <p
                        class="grey-text text-darken-1"
                        style="font-size: 14px"
                      >
                        <span>〒</span
                        ><span th:text="${hotel.zipcode}">
                          〒594-1074 <br /> </span
                        ><br />
                        <span th:text="${hotel.address}">
                          沖縄県那覇市1-1-1<br /> </span
                        ><br />
                        <span>電話番号: </span
                        ><span th:text="${hotel.telephone}">
                          電話番号: 099-1146-5567
                        </span>
                      </p>
                    </div>
                  </div>
                </div>
              </div>

              <form
                th:action="@{/reserve/confirm}"
                th:object="${reservationForm}"
                method="post"
              >
                <!-- 名前 -->
                <div class="input-field">
                  <input id="name" type="text" required />
                  <label for="name">宿泊者氏名</label>
                </div>

                <!-- メール -->
                <div class="input-field">
                  <input id="email" type="email" required />
                  <label for="email">メールアドレス</label>
                </div>

                <!-- 電話番号 -->
                <div class="input-field">
                  <input id="phone" type="tel" />
                  <label for="phone">電話番号（任意）</label>
                </div>

                <!-- チェックイン・アウト -->
                <div class="row">
                  <div class="input-field col s6">
                    <input
                      type="date"
                      id="checkin"
                      name="checkin_date"
                      th:field="*{checkinDate}"
                      required
                    />
                    <label for="checkin">チェックイン日</label>
                  </div>
                  <div class="input-field col s6">
                    <input
                      type="date"
                      id="checkout"
                      name="checkout_date"
                      th:field="*{checkoutDate}"
                      required
                    />
                    <label for="checkout">チェックアウト日</label>
                  </div>
                </div>

                <!-- 宿泊人数・部屋数 -->
                <div class="row">
                  <div class="input-field col s6">
                    <input
                      id="guests"
                      type="number"
                      min="1"
                      th:field="*{guestCount}"
                      required
                    />
                    <label for="guests">宿泊人数</label>
                  </div>
                  <div class="input-field col s6">
                    <input id="rooms" type="number" min="1" required />
                    <label for="rooms">部屋数</label>
                  </div>
                </div>

                <!-- 宿泊プラン選択 -->
                <div class="input-field">
                  <select name="plan_id" th:field="*{planId}" required>
                    <option value="" disabled selected>プランを選択</option>
                    <option value="1">素泊まりプラン</option>
                    <option value="2">朝食付きプラン</option>
                    <option value="3">2食付きプラン（朝・夕）</option>
                    <option value="4">特別プラン（貸切温泉付き）</option>
                  </select>
                  <label>宿泊プラン</label>
                </div>

                <!-- 支払い方法 -->
                <p class="grey-text text-darken-1" style="margin-top: 25px">
                  支払い方法
                </p>
                <p>
                  <label>
                    <input
                      name="payment"
                      class="with-gap"
                      type="radio"
                      value="1"
                      required
                    />
                    <span>クレジットカード</span>
                  </label>
                </p>
                <p>
                  <label>
                    <input
                      name="payment"
                      class="with-gap"
                      type="radio"
                      value="2"
                    />
                    <span>現地現金払い</span>
                  </label>
                </p>
                <p>
                  <label>
                    <input
                      name="payment"
                      class="with-gap"
                      type="radio"
                      value="3"
                    />
                    <span>電子マネー（PayPay等）</span>
                  </label>
                </p>

                <!-- 要望 -->
                <div class="input-field">
                  <textarea
                    id="requests"
                    class="materialize-textarea"
                  ></textarea>
                  <label for="requests">ご要望（任意）</label>
                </div>

                <!-- 合計料金 -->
                <div
                  class="card-panel light-blue lighten-5"
                  style="margin-top: 20px"
                >
                  <span class="blue-text text-darken-2">
                    <strong>見積もり料金：</strong> ¥14,900
                  </span>
                </div>

                <!-- 送信ボタン -->
                <button
                  class="btn waves-effect waves-light"
                  type="submit"
                  style="width: 100%; margin-top: 10px"
                >
                  予約を確定する
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- フッター -->
    <footer class="page-footer grey lighten-4 grey-text text-darken-1">
      <div class="container center-align">
        &copy; 2025 宿泊予約サイト All rights reserved.
      </div>
    </footer>

    <!-- JS & 初期化 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const elems = document.querySelectorAll("select");
        M.FormSelect.init(elems);
      });
    </script>
  </body>
</html>
