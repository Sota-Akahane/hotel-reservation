<!DOCTYPE html>
<html lang="ja">
  <head>
    <!--Import Google Icon Font-->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <!--Import materialize.css-->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css"
      rel="stylesheet"
    />
    <!--Import internal css-->
    <link rel="stylesheet" href="../static/css/common.css" />
    <link rel="stylesheet" href="../static/css/complete.css" />

    <!--Let browser know website is optimized for mobile-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />

    <title>予約内容の確認</title>
  </head>
  <body class="grey lighten-4">
    <header>
      <nav class="white z-depth-1">
        <div class="nav-wrapper container">
          <a href="top.html" class="brand-logo">
            <img
              src="../static/img/logo.png"
              alt="宿泊予約サイトロゴ"
              class="logo-img"
            />
          </a>

          <ul class="right hide-on-med-and-down">
            <li><a href="hotel_list.html" class="black-text">施設一覧</a></li>
            <li><a href="mypage.html" class="black-text">マイページ</a></li>
            <li><a href="login.html" class="black-text">ログイン</a></li>
            <li>
              <a href="register.html" class="btn blue lighten-1 white-text"
                >会員登録</a
              >
            </li>
          </ul>
        </div>
      </nav>
    </header>

    <div class="site-wrapper">
      <div class="container" style="margin-top: 60px; max-width: 700px">
        <form
          th:action="@{/reserve/complete}"
          th:object="${reservationForm}"
          method="post"
        >
          <div class="card">
            <div class="card-content">
              <span class="card-title center-align">予約内容の確認</span>

              <ul class="collection">
                <li class="collection-item">
                  <strong>宿泊者氏名：</strong
                  ><span th:text="${session.loginUser.name}">山田 太郎</span>
                </li>
                <li class="collection-item">
                  <strong>メールアドレス：</strong
                  ><span th:text="${session.loginUser.email}"
                    >yamada@example.com</span
                  >
                </li>
                <li class="collection-item">
                  <strong>チェックイン日： </strong
                  ><span th:text="${reservationForm.checkinDate}">
                    2025年7月1日</span
                  >
                </li>
                <li class="collection-item">
                  <strong>チェックアウト日： </strong
                  ><span th:text="${reservationForm.checkoutDate}">
                    2025年7月3日</span
                  >
                </li>
                <li class="collection-item">
                  <strong>宿泊人数： </strong
                  ><span th:text="${reservationForm.guestCount}">2名</span>
                </li>
                <li class="collection-item"><strong>部屋数：</strong> 1部屋</li>
                <li class="collection-item">
                  <strong>宿泊プラン：</strong> 2食付きプラン
                </li>
                <li class="collection-item">
                  <strong>支払い方法：</strong> クレジットカード
                </li>
                <li class="collection-item">
                  <strong>ご要望：</strong> 高層階を希望
                </li>
                <li class="collection-item">
                  <strong>見積もり料金：</strong> ¥52,000
                </li>
              </ul>

              <input
                type="hidden"
                name="checkinDate"
                th:value="${reservationForm.checkinDate}"
              />
              <input
                type="hidden"
                name="checkoutDate"
                th:value="${reservationForm.checkoutDate}"
              />
              <input
                type="hidden"
                name="guestCount"
                th:value="${reservationForm.guestCount}"
              />
              <input
                type="hidden"
                name="planId"
                th:value="${reservationForm.planId}"
              />
              <input type="hidden" th:field="*{paymentMethod}" />

              <button
                class="btn waves-effect waves-light"
                type="submit"
                style="width: 100%; margin-top: 10px"
              >
                予約を確定する
              </button>
              <!-- <div class="center-align" style="margin-top: 20px">
                <a
                  th:href="@{/reserve/complete}"
                  class="btn waves-effect waves-light"
                  >予約を確定する</a
                >
              </div> -->
              <div class="center-align" style="margin-top: 10px">
                <a href="reservation.html" class="grey-text text-darken-1"
                  >戻って修正する</a
                >
              </div>
            </div>
          </div>
        </form>
      </div>

      <!-- フッター -->
      <footer class="page-footer grey lighten-4 grey-text text-darken-1">
        <div class="container center-align">
          &copy; 2025 宿泊予約サイト All rights reserved.
        </div>
      </footer>
    </div>
  </body>
</html>
