<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <!--Import Google Icon Font-->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <!--Import materialize.css-->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css"
      rel="stylesheet"
    />
    <!--Import internal css-->
    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <link rel="stylesheet" th:href="@{/css/complete.css}" />

    <!--Let browser know website is optimized for mobile-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />

    <title>会員登録</title>
  </head>

  <body class="grey lighten-4">
    <header>
      <nav class="white z-depth-1">
        <div class="nav-wrapper container">
          <a th:href="@{/top}" class="brand-logo">
            <img
              th:src="@{/img/logo.png}"
              alt="宿泊予約サイトロゴ"
              class="logo-img"
            />
          </a>

          <ul class="right hide-on-med-and-down">
            <li>
              <a th:href="@{/showHotelList}" class="black-text">施設一覧</a>
            </li>
            <li><a href="mypage.html" class="black-text">マイページ</a></li>
            <li><a th:href="@{/toLogin}" class="black-text">ログイン</a></li>
            <li>
              <a href="register.html" class="btn blue lighten-1 white-text"
                >会員登録</a
              >
            </li>
          </ul>
        </div>
      </nav>
    </header>

    <div class="site-wrapper">
      <div class="container" style="margin-top: 80px">
        <div class="row">
          <div class="col s12 m6 offset-m3">
            <div class="card">
              <div class="card-content">
                <span class="card-title center-align">会員登録</span>

                <form
                  th:action="@{/register}"
                  th:object="${registerUserForm}"
                  method="post"
                >
                  <div class="input-field">
                    <input id="name" type="text" th:field="*{name}" required />
                    <label for="name">氏名</label>
                  </div>

                  <div class="input-field">
                    <input
                      id="email"
                      type="email"
                      th:field="*{email}"
                      required
                    />
                    <label for="email">メールアドレス</label>
                  </div>

                  <div class="input-field">
                    <input
                      id="telephone"
                      type="text"
                      th:field="*{telephone}"
                      required
                    />
                    <label for="telephone">電話番号</label>
                  </div>

                  <div class="input-field">
                    <input
                      id="password"
                      type="password"
                      th:field="*{password}"
                      required
                    />
                    <label for="password">パスワード</label>
                  </div>

                  <div class="input-field">
                    <input id="confirm_password" type="password" required />
                    <label for="confirm_password">パスワード（確認）</label>
                  </div>

                  <button
                    class="btn waves-effect waves-light full-width"
                    type="submit"
                    style="width: 100%"
                  >
                    登録する
                  </button>
                </form>
              </div>

              <div class="card-action center-align">
                すでにアカウントをお持ちの方は
                <a th:href="@{/toLogin}">ログイン</a>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- フッター -->
      <footer class="page-footer grey lighten-4 grey-text text-darken-1">
        <div class="container center-align">
          &copy; 2025 宿泊予約サイト All rights reserved.
        </div>
      </footer>
    </div>
    <!-- Materialize JS CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  </body>
</html>
